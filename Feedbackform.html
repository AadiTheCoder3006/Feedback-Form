<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Hub - Survey Form</title>
    <link rel="stylesheet" href="Surveyform.css">
    </head>

<body>
    <h1 id="title">Event Hub Feedback Form</h1>
    <p id="description">We value your input! Please help us improve our upcoming events by filling out this quick survey.</p>
    
    <form id="survey-form">
        <label id="name-label" for="name">Full Name</label>
        <br>
        <input id="name" type="text" required placeholder="Enter your name">
        <br>
        <br>

        <label id="email-label" for="email">Email Address</label>
        <br>
        <input id="email" type="email" placeholder="Enter your email" required>
        <br>
        <br>

        <label id="number-label" for="number">Age</label>
        <br>
        <input id="number" type="number" min="3" max="99" required placeholder="Age">
        <br>
        <br>

        <label for="dropdown">How did you hear about Event Hub?</label>
        <br>
        <select id="dropdown" required>
            <option disabled selected value="">Select an option</option>
            <option value="social-media">Social Media</option>
            <option value="friends">Friends/Family</option>
            <option value="advertisement">Advertisement</option>
            <option value="other">Other</option>
        </select>
        <br>
        <br>

        <p>Would you recommend our events to others?</p>
        <input type="radio" name="recommend" value="definitely" id="definitely" checked>
        <label for="definitely">Definitely</label>
        <br>
        <input type="radio" name="recommend" value="maybe" id="maybe">
        <label for="maybe">Maybe</label>
        <br>
        <input type="radio" name="recommend" value="not-sure" id="not-sure">
        <label for="not-sure">Not Sure</label>
        <br>
        <br>

        <p>What topics are you interested in? (Select all that apply)</p>
        <input type="checkbox" id="tech" value="tech">
        <label for="tech">Technology</label>
        <br>
        <input type="checkbox" id="music" value="music">
        <label for="music">Music & Art</label>
        <br>
        <input type="checkbox" id="fitness" value="fitness">
        <label for="fitness">Fitness & Health</label>
        <br>
        <br>

        <label for="comments">Any suggestions or queries?</label><br>
        <textarea id="comments" placeholder="Write your thoughts here..."></textarea>
        <br>
        <br>

        <button type="submit" id="submit">Submit Survey</button>
<br>
<br>
<br>
<br>
<hr>
<p id="MYwork">Made with ❤️ by [AadiTheCoder]</p>
    </form>
</body>
</html>
